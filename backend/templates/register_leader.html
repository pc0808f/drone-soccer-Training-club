{% extends "base.html" %}
{% block title %}領隊報名{% endblock %}
{% block content %}
<div class="card">
  <h1>領隊報名</h1>
  <p class="subtitle">填寫資料後將自動建立隊伍</p>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/register/leader">
    <div style="background:var(--primary-light);border-radius:10px;padding:14px;margin-bottom:24px;">
      <p style="font-size:14px;font-weight:700;color:var(--primary-dark);">隊伍資訊</p>
    </div>

    <div class="form-group">
      <label>隊伍名稱 <span class="required">*</span></label>
      <input type="text" name="team_name" required placeholder="例如：台北酷飛隊">
    </div>

    <div class="form-group">
      <label>所屬單位/學校</label>
      <input type="text" name="organization" placeholder="例如：台北市立大安高工">
      <div class="form-hint">若無可留空</div>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:24px 0;">

    <div style="background:var(--primary-light);border-radius:10px;padding:14px;margin-bottom:24px;">
      <p style="font-size:14px;font-weight:700;color:var(--primary-dark);">領隊個人資料</p>
    </div>

    <div class="form-group">
      <label>姓名 <span class="required">*</span></label>
      <input type="text" name="name" required placeholder="請填寫真實姓名">
    </div>

    <div class="form-group">
      <label>性別 <span class="required">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="gender" value="男" required> 男</label>
        <label><input type="radio" name="gender" value="女" required> 女</label>
      </div>
    </div>

    <div class="form-group">
      <label>出生年月 <span class="required">*</span></label>
      <input type="text" name="birth_date" required placeholder="例如：2000年3月">
    </div>

    <div class="form-group">
      <label>台胞證號 <span class="required">*</span></label>
      <input type="text" name="taiwan_passport" required placeholder="請填寫台胞證號">
    </div>

    <div class="form-group">
      <label>台灣身分證號 <span class="required">*</span></label>
      <input type="text" name="tw_id" required placeholder="A123456789">
    </div>

    <div class="form-group">
      <label>手機號碼 <span class="required">*</span></label>
      <input type="text" name="phone" required placeholder="0912-345-678">
    </div>

    <div class="form-group">
      <label>是否首次來大陸？ <span class="required">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="first_time_in_china" value="是" required> 是</label>
        <label><input type="radio" name="first_time_in_china" value="否" required> 否</label>
      </div>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:24px 0;">

    <div style="background:var(--green-light);border-radius:10px;padding:14px;margin-bottom:24px;">
      <p style="font-size:14px;font-weight:700;color:var(--green);">飲食需求</p>
    </div>

    <div class="form-group">
      <label>飲食習慣 <span class="required">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="diet_type" value="葷食" required> 葷食</label>
        <label><input type="radio" name="diet_type" value="素食" required> 素食</label>
      </div>
    </div>

    <div class="form-group checkbox-group">
      <label><input type="checkbox" name="no_beef" value="true"> 不吃牛肉</label>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:24px 0;">

    <button type="submit" class="btn btn-primary">送出報名</button>
  </form>
</div>
{% endblock %}
