<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}無人機足球研習營報名系統{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F7FA;
  --bg2: #FFFFFF;
  --text: #1A2335;
  --text2: #4A5568;
  --muted: #8A97A8;
  --primary: #3B7BF5;
  --primary-light: #EBF1FF;
  --primary-dark: #2560D8;
  --green: #18B77E;
  --green-light: #E6F8F2;
  --orange: #FF6B35;
  --orange-light: #FFF0EB;
  --yellow: #C99A06;
  --yellow-light: #FBF3DD;
  --border: #E2E8F0;
  --card-shadow: 0 2px 16px rgba(0,0,0,0.07);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 40px 20px;
  flex: 1;
}
.card {
  background: var(--bg2);
  border-radius: 16px;
  box-shadow: var(--card-shadow);
  padding: 36px 28px;
}
h1 {
  font-size: 26px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 8px;
}
h1 .accent {
  color: var(--primary);
}
.subtitle {
  text-align: center;
  color: var(--text2);
  font-size: 14px;
  margin-bottom: 28px;
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}
.form-group label .required {
  color: #E53E3E;
  margin-left: 2px;
}
.form-group input,
.form-group select {
  width: 100%;
  padding: 12px 14px;
  font-size: 15px;
  font-family: inherit;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--bg2);
  color: var(--text);
  transition: border-color 0.2s;
}
.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}
.radio-group {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.radio-group label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
  cursor: pointer;
}
.radio-group input[type="radio"] {
  width: auto;
  accent-color: var(--primary);
}
.checkbox-group label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 500;
  cursor: pointer;
}
.checkbox-group input[type="checkbox"] {
  width: auto;
  accent-color: var(--primary);
}
.form-hint {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  font-size: 17px;
  font-weight: 700;
  font-family: inherit;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.btn:active { transform: scale(0.98); }
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-primary:hover { opacity: 0.9; }
.btn-outline {
  background: transparent;
  color: var(--primary);
  border: 2px solid var(--primary);
}
.btn-outline:hover { background: var(--primary-light); }
.error-msg {
  background: #FFF5F5;
  color: #C53030;
  border: 1px solid #FED7D7;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 20px;
}
footer {
  text-align: center;
  padding: 24px;
  font-size: 12px;
  color: var(--muted);
}
</style>
</head>
<body>
<div class="container">
  {% block content %}{% endblock %}
</div>
<footer>兩岸無人機足球青年領袖研習營 2026 報名系統</footer>
</body>
</html>
